<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Cashnettes</title>

    <style>
        body {

        }

        .box {

            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5b6eae;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>👋 Bienvenue sur Cashnettes</h1>
