<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cashnettes - D7</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #126e3a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 50px;
            gap: 30px;
        }

        form {
            background: #232b28;
            padding: 30px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #7289da;
            margin-bottom: 10px;
        }

        p.hint {
            text-align: center;
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        input, textarea, select {
            width: 100%;
            margin-bottom: 12px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #40444b;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        /* Style spécifique pour le menu déroulant */
        select {
            cursor: pointer;
            appearance: none;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #7289da;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #5b6eae;
        }

        .map-container {
            width: 320px;
            text-align: center;
        }

        .map-image {
            width: 100%;
            border-radius: 10px;
            border: 3px solid #7289da;
        }

        .info-text {
            margin-top: 12px;
            color: #e0e0e0;
            font-size: 12px;
            line-height: 1.4;
        }

        .footer-note {
            margin-top: 10px;
            font-size: 11px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <form method="POST">
        <h1>Cashnettes</h1>
        <p class="hint">
            Remplissez toutes les informations pour accélérer le traitement de votre demande.
        </p>

        <input type="text" name="nom" placeholder="Votre nom" required>

        <select name="adresse" id="adresse" required>
            <option value="" disabled selected>-- Sélectionnez votre adresse --</option>
            {% for secteur in secteurs %}
                <option value="{{ secteur }}">{{ secteur|title }}</option>
            {% endfor %}
        </select>

        <input type="text" name="emplacement" placeholder="Emplacement précis" required>
        <input type="text" name="moment" placeholder="Moment souhaité (ex: Samedi 10h)" required>
        <input type="text" name="acces" placeholder="Accès (code porte / info)" required>
        <input type="text" name="heure_limite" placeholder="Heure limite" required>

        <textarea name="notes" placeholder="Notes complémentaires (optionnel)"></textarea>

        <button type="submit">VALIDER LA DEMANDE</button>

        <div class="footer-note">
            Service réservé au Secteur E uniquement.
        </div>
    </form>

    <div class="map-container">
        <img src="{{ url_for('static', filename='carte_secteur.png') }}" alt="Zone de service" class="map-image">
        <p class="info-text">
            <strong>Zone actuelle de service.</strong><br><br>
            Nous desservons uniquement les adresses situées dans cette zone géographique.
        </p>
    </div>

</body>
</html>
