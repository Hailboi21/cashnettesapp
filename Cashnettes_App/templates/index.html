<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cashnettes - D7</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #126e3a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            padding: 50px; 
            gap: 30px; /* Espace entre le formulaire et la carte */
        }
        form { background: #232b28; padding: 30px; border-radius: 10px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #7289da; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 12px; border: none; border-radius: 5px; background: #40444b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; background: #7289da; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #5b6eae; }
        
        /* Styles pour la zone de la carte */
        .map-container { width: 325px; text-align: middle; }
        .map-image { width: 100%; border-radius: 10px; border: 3px solid #7289da; }
        .info-text { margin-top: 15px; color: #e0e0e0; font-size: 0.7em; line-height: 0.8; }
    </style>
</head>
<body>

    <form method="POST">
        <h1>Cashnettes</h1>
        <input type="text" name="nom" placeholder="Votre nom" required>
        <input type="text" name="adresse" placeholder="Adresse (ex: Rue Saint-Pierre)" required>
        <input type="text" name="emplacement" placeholder="Emplacement précis">
        <input type="text" name="moment" placeholder="Moment (ex: Samedi 10h)">
        <input type="text" name="acces" placeholder="Accès (code porte)">
        <input type="text" name="heure_limite" placeholder="Heure limite">
        <textarea name="notes" placeholder="Notes complémentaires"></textarea>
        <button type="submit">VALIDER LA DEMANDE</button>
    </form>

    <div class="map-container">
        <img src="{{ url_for('static', filename='carte_secteur.png') }}" alt="Zone de service" class="map-image">
        <p class="info-text">
            <strong>Zone actuelle de service (District 7).</strong><br>
            Nous desservons uniquement les adresses situées dans cette zone géographique pour le moment. Une expansion vers de nouveaux secteurs est prévue prochainement.
        </p>
    </div>

</body>
</html>
